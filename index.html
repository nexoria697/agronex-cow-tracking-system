<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#e8f5e9;margin:0;text-align:center;}
header{background:#2e7d32;color:white;padding:20px;}
header img{height:60px;vertical-align:middle;}
.container{margin-top:30px;}
button{padding:10px 20px;margin:5px;border:none;background:#4CAF50;color:white;cursor:pointer;border-radius:5px;}
input{padding:8px;margin:5px;width:200px;}
.section{display:none;margin-top:20px;}
ul{list-style:none;padding-left:0;}
img.cow{width:200px;margin-bottom:20px;border-radius:10px;}
.chart-container{width:80%;max-width:600px;margin:auto;}
</style>
</head>

<body>

<header>
<img src="agroneX_logo.png" alt="Agronex Logo">
<h1>Agronex Cow Tracking System</h1>
</header>

<div id="loginSection" class="container">
<img src="cow.png" class="cow" alt="Cow Image">
<h2>Giriş Yap</h2>
<input id="loginEmail" placeholder="Gmail"><br>
<input id="loginPassword" type="password" placeholder="Şifre"><br>
<button onclick="login()">Giriş Yap</button>
<hr>
<h2>Üye Ol</h2>
<input id="email" placeholder="Gmail"><br>
<input id="password" type="password" placeholder="Şifre"><br>
<button onclick="register()">Üye Ol</button>
</div>

<div id="systemPanel" class="container section">

<h2>Kontrol Paneli</h2>
<div>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('cow')">İnek Takip</button>
<button onclick="showTab('vaccine')">Aşı Takvimi</button>
<button onclick="showTab('heat')">Kızgınlık</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="section">
<h3>Dashboard</h3>
<div class="chart-container">
<canvas id="tempChart"></canvas>
</div>
<div class="chart-container">
<canvas id="activityChart"></canvas>
</div>
</div>

<!-- Cow Tracking -->
<div id="cow" class="section">
<h3>İnek Takip</h3>
<input id="cowID" placeholder="İnek ID">
<button onclick="addCow()">İnek Ekle</button>
<ul id="cowList"></ul>
</div>

<!-- Vaccine Schedule -->
<div id="vaccine" class="section">
<h3>Aşı Takvimi</h3>
<input id="vCowID" placeholder="İnek ID"><br>
<input id="vDate" type="date"><br>
<button onclick="addVaccine()">Ekle</button>
<ul id="vaccineList"></ul>
</div>

<!-- Heat Detection -->
<div id="heat" class="section">
<h3>Kızgınlık Algılama</h3>
<ul id="heatList"></ul>
<button onclick="simulateHeat()">Simüle Et</button>
</div>

<script>
function register(){
  let email=document.getElementById("email").value
  let password=document.getElementById("password").value
  if(email && password){
    localStorage.setItem(email,password)
    alert("Üyelik oluşturuldu")
  } else { alert("Lütfen tüm alanları doldur") }
}

function login(){
  let email=document.getElementById("loginEmail").value
  let password=document.getElementById("loginPassword").value
  let stored=localStorage.getItem(email)
  if(stored==password){
    alert("Giriş başarılı")
    document.getElementById("loginSection").style.display="none"
    document.getElementById("systemPanel").style.display="block"
    showTab('dashboard')
    simulateData()
  } else{ alert("Hatalı giriş") }
}

function showTab(id){
  let tabs=document.querySelectorAll('#systemPanel .section')
  tabs.forEach(t=>t.style.display='none')
  document.getElementById(id).style.display='block'
}

// İnek ekleme ve silme
function addCow(){
  let id=document.getElementById("cowID").value
  if(!id) return;
  let list=document.getElementById("cowList")
  let li=document.createElement("li")
  li.innerText="İnek ID: "+id

  // Sil butonu ekle
  let btn=document.createElement("button")
  btn.innerText="Sil"
  btn.style.marginLeft="10px"
  btn.onclick=function(){ list.removeChild(li) }

  li.appendChild(btn)
  list.appendChild(li)
  document.getElementById("cowID").value=""
}

// Aşı ekleme
function addVaccine(){
  let id=document.getElementById("vCowID").value
  let date=document.getElementById("vDate").value
  if(!id || !date) return;
  let list=document.getElementById("vaccineList")
  let li=document.createElement("li")
  li.innerText="İnek "+id+" - Aşı Tarihi: "+date
  list.appendChild(li)
  document.getElementById("vCowID").value=""
  document.getElementById("vDate").value=""
}

// Kızgınlık simülasyonu
function simulateHeat(){
  let list=document.getElementById("heatList")
  let li=document.createElement("li")
  li.innerText="İnek "+(Math.floor(Math.random()*10+1))+" kızgınlık algılandı"
  list.appendChild(li)
}

// Grafik simülasyonu
let tempChart, activityChart
function simulateData(){
  const ctx1=document.getElementById('tempChart').getContext('2d')
  const ctx2=document.getElementById('activityChart').getContext('2d')
  let labels=Array.from({length:10},(_,i)=>"İnek "+(i+1))
  let tempData=labels.map(()=>Math.random()*5+37)
  let actData=labels.map(()=>Math.floor(Math.random()*100))
  tempChart=new Chart(ctx1,{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Sıcaklık (°C)',data:tempData,backgroundColor:'#4CAF50'}]},
    options:{scales:{y:{beginAtZero:true}}}
  })
  activityChart=new Chart(ctx2,{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Aktivite',data:actData,backgroundColor:'#2e7d32'}]},
    options:{scales:{y:{beginAtZero:true}}}
  })
}
</script>

</body>
</html>
