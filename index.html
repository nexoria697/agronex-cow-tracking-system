<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>

<style>

body{
font-family:Arial;
background:#e8f5e9;
text-align:center;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
}

.container{
margin-top:60px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:12px 20px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>Agronex Cow Tracking System</h1>
</header>

<div class="container">

<h2>Üye Ol</h2>

<input id="email" placeholder="Gmail">
<br>

<input id="password" type="password" placeholder="Şifre">
<br>

<button onclick="register()">Üye Ol</button>

<hr>

<h2>Giriş Yap</h2>

<input id="loginEmail" placeholder="Gmail">
<br>

<input id="loginPassword" type="password" placeholder="Şifre">
<br>

<button onclick="login()">Giriş Yap</button>

</div>

<script>

function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

localStorage.setItem(email,password)

alert("Üyelik oluşturuldu")

}

function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let stored=localStorage.getItem(email)

if(stored==password){

alert("Giriş başarılı")

window.location="dashboard.html"

}

else{

alert("Hatalı giriş")

}

}

</script>

</body>
</html>
