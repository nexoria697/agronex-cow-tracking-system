<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking</title>

<style>
body { font-family: Arial; background:#f0fff0; color:#006400; text-align:center; }
table { border-collapse: collapse; margin:auto; width:80%; }
th, td { border:1px solid #006400; padding:10px; }
th { background:#98fb98; }
</style>

<!-- mqtt kütüphanesi -->
<script src="mqtt.min.js"></script>

</head>
<body>

<h2>Agronex Cow Tracking System</h2>

<table id="cowTable">
<tr>
<th>Cow ID</th>
<th>Temperature</th>
<th>Activity</th>
</tr>
</table>

<script>

// MQTT BAĞLANTI
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

// BAĞLANDI
client.on('connect', () => {
  console.log("MQTT bağlandı");
  client.subscribe("agronex/cowdata");
});

// VERİ GELDİĞİNDE
client.on('message', (topic, message) => {

  const data = message.toString().split(",");
  const cowID = data[0];
  const temp = data[1];
  const activity = data[2];

  console.log("Gelen veri:", cowID, temp, activity);

  const table = document.getElementById("cowTable");

  // eski satır varsa sil
  const old = document.getElementById("row-" + cowID);
  if(old) old.remove();

  // yeni satır ekle
  const row = table.insertRow();
  row.id = "row-" + cowID;

  row.insertCell(0).innerText = cowID;
  row.insertCell(1).innerText = temp;
  row.insertCell(2).innerText = activity;
});


// 🔥 TEST BUTONU (çok önemli)
function testVeri(){
  client.publish("agronex/cowdata", "999,37.5,80");
}

</script>

<br><br>
<button onclick="testVeri()">TEST VERİ GÖNDER</button>

</body>
</html>
