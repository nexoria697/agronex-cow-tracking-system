<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>

<style>

body{
font-family:Arial;
background:#e8f5e9;
margin:0;
text-align:center;
}

header{
background:#2e7d32;
color:white;
padding:20px;
}

.menu{
margin:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#4CAF50;
color:white;
cursor:pointer;
}

.section{
display:none;
margin-top:20px;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>
<h1>Agronex Cow Tracking System</h1>
</header>

<div class="menu">

<button onclick="showSection('login')">Giriş</button>
<button onclick="showSection('register')">Üye Ol</button>
<button onclick="showSection('dashboard')">Panel</button>
<button onclick="showSection('cow')">İnek Takip</button>
<button onclick="showSection('vaccine')">Aşı Takvimi</button>
<button onclick="showSection('heat')">Kızgınlık</button>

</div>

<div id="login" class="section">

<h2>Giriş Yap</h2>

<input id="loginEmail" placeholder="Gmail">
<br>
<input id="loginPassword" type="password" placeholder="Şifre">
<br>

<button onclick="login()">Giriş Yap</button>

</div>


<div id="register" class="section">

<h2>Üye Ol</h2>

<input id="email" placeholder="Gmail">
<br>

<input id="password" type="password" placeholder="Şifre">
<br>

<button onclick="register()">Üye Ol</button>

</div>


<div id="dashboard" class="section">

<h2>Kontrol Paneli</h2>

<p>Sistem çalışıyor</p>

</div>


<div id="cow" class="section">

<h2>İnek Takip</h2>

<input id="cowID" placeholder="İnek ID">

<button onclick="addCow()">İnek Ekle</button>

<ul id="cowList"></ul>

</div>


<div id="vaccine" class="section">

<h2>Aşı Takvimi</h2>

<input id="vCowID" placeholder="İnek ID">
<br>

<input id="vDate" type="date">

<button onclick="addVaccine()">Ekle</button>

<ul id="vaccineList"></ul>

</div>


<div id="heat" class="section">

<h2>Kızgınlık Algılama</h2>

<ul id="heatList"></ul>

</div>


<script>

function showSection(id){

let sections=document.querySelectorAll(".section")

sections.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}


function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

localStorage.setItem(email,password)

alert("Üyelik oluşturuldu")

}


function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let stored=localStorage.getItem(email)

if(stored==password){

alert("Giriş başarılı")

showSection("dashboard")

}else{

alert("Hatalı giriş")

}

}


function addCow(){

let id=document.getElementById("cowID").value

let list=document.getElementById("cowList")

let li=document.createElement("li")

li.innerText="İnek ID: "+id

list.appendChild(li)

}


function addVaccine(){

let id=document.getElementById("vCowID").value
let date=document.getElementById("vDate").value

let list=document.getElementById("vaccineList")

let li=document.createElement("li")

li.innerText="İnek "+id+" - Aşı Tarihi: "+date

list.appendChild(li)

}

</script>

</body>
</html>
