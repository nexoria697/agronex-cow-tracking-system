<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>
<style>
  body { font-family: Arial; background-color: #f0fff0; color: #006400; }
  h2 { text-align: center; }
  table { border-collapse: collapse; width: 90%; margin: auto; }
  th, td { border: 1px solid #006400; padding: 8px; text-align: center; }
  th { background-color: #98fb98; }
  tr:nth-child(even) { background-color: #e6ffe6; }
</style>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
<h2>Agronex Cow Tracking System</h2>

<table id="cowTable">
  <tr>
    <th>Inek ID</th>
    <th>Sıcaklık (°C)</th>
    <th>Hareket</th>
  </tr>
</table>

<script>
  // MQTT broker ve kanal
  const broker = 'wss://test.mosquitto.org:8081/mqtt';
  const topic = 'agronex/cowdata';

  // MQTT client oluştur
  const client = mqtt.connect(broker);

  client.on('connect', () => {
    console.log('MQTT bağlandı');
    client.subscribe(topic, (err) => {
      if (!err) console.log('Abone olundu: ' + topic);
    });
  });

  client.on('message', (topic, message) => {
    const data = message.toString().split(',');
    const inekID = data[0];
    const sicaklik = data[1];
    const hareket = data[2];

    // Tabloya ekle/güncelle
    const table = document.getElementById('cowTable');
    const existingRow = document.getElementById('row-' + inekID);
    if(existingRow) existingRow.remove();

    const row = table.insertRow();
    row.id = 'row-' + inekID;
    row.insertCell(0).innerText = inekID;
    row.insertCell(1).innerText = sicaklik;
    row.insertCell(2).innerText = hareket;
  });
</script>
</body>
</html>
