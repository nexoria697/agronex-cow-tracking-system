<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0;text-align:center;}
header{background:#2e7d32;color:white;padding:20px;}
.container{margin-top:50px;}
button{padding:10px 20px;margin:5px;border:none;background:#4CAF50;color:white;cursor:pointer;}
input{padding:8px;margin:5px;width:200px;}
.section{display:none;margin-top:20px;}
</style>

</head>

<body>

<header>
<h1>Agronex Cow Tracking System</h1>
</header>

<div id="loginSection" class="container">
<h2>Giriş Yap</h2>
<input id="loginEmail" placeholder="Gmail"><br>
<input id="loginPassword" type="password" placeholder="Şifre"><br>
<button onclick="login()">Giriş Yap</button>
<hr>
<h2>Üye Ol</h2>
<input id="email" placeholder="Gmail"><br>
<input id="password" type="password" placeholder="Şifre"><br>
<button onclick="register()">Üye Ol</button>
</div>

<div id="systemPanel" class="container section">
<h2>Kontrol Paneli</h2>

<div>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('cow')">İnek Takip</button>
<button onclick="showTab('vaccine')">Aşı Takvimi</button>
<button onclick="showTab('heat')">Kızgınlık</button>
</div>

<div id="dashboard" class="section"><p>Sistem çalışıyor</p></div>

<div id="cow" class="section">
<h3>İnek Takip</h3>
<input id="cowID" placeholder="İnek ID">
<button onclick="addCow()">İnek Ekle</button>
<ul id="cowList"></ul>
</div>

<div id="vaccine" class="section">
<h3>Aşı Takvimi</h3>
<input id="vCowID" placeholder="İnek ID"><br>
<input id="vDate" type="date"><br>
<button onclick="addVaccine()">Ekle</button>
<ul id="vaccineList"></ul>
</div>

<div id="heat" class="section">
<h3>Kızgınlık Algılama</h3>
<ul id="heatList"></ul>
</div>

<script>
function register(){
let email=document.getElementById("email").value
let password=document.getElementById("password").value
localStorage.setItem(email,password)
alert("Üyelik oluşturuldu")
}

function login(){
let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value
let stored=localStorage.getItem(email)
if(stored==password){
alert("Giriş başarılı")
document.getElementById("loginSection").style.display="none"
document.getElementById("systemPanel").style.display="block"
showTab('dashboard')
}else{
alert("Hatalı giriş")
}
}

function showTab(id){
let tabs=document.querySelectorAll('#systemPanel .section')
tabs.forEach(t=>t.style.display='none')
document.getElementById(id).style.display='block'
}

function addCow(){
let id=document.getElementById("cowID").value
let list=document.getElementById("cowList")
let li=document.createElement("li")
li.innerText="İnek ID: "+id
list.appendChild(li)
}

function addVaccine(){
let id=document.getElementById("vCowID").value
let date=document.getElementById("vDate").value
let list=document.getElementById("vaccineList")
let li=document.createElement("li")
li.innerText="İnek "+id+" - Aşı Tarihi: "+date
list.appendChild(li)
}
</script>

</body>
</html>
