<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agronex Cow Tracking System</title>
<style>
  body { font-family: Arial; background-color: #f0fff0; color: #006400; padding: 20px; }
  h2, h3 { text-align: center; }
  table { border-collapse: collapse; width: 90%; margin: auto 0 20px; }
  th, td { border: 1px solid #006400; padding: 8px; text-align: center; }
  th { background-color: #98fb98; }
  tr:nth-child(even) { background-color: #e6ffe6; }
  button { padding: 5px 10px; margin: 2px; background-color: #006400; color: white; border: none; cursor: pointer; }
  button:hover { background-color: #004d00; }
  input { padding: 5px; margin: 2px; }
  .section { margin: 20px auto; width: 90%; }
</style>
<!-- Place mqtt.min.js in your repo and call locally -->
<script src="mqtt.min.js"></script>
</head>
<body>

<h2>Agronex Cow Tracking System</h2>

<div class="section">
<h3>Live Cow Data</h3>
<table id="cowTable">
  <tr>
    <th>Cow ID</th>
    <th>Temperature (°C)</th>
    <th>Activity</th>
    <th>Actions</th>
  </tr>
</table>
</div>

<div class="section">
<h3>Add Cow</h3>
<input type="text" id="addCowID" placeholder="Cow ID">
<input type="text" id="addTemp" placeholder="Temperature">
<input type="text" id="addActivity" placeholder="Activity">
<button onclick="addCow()">Add Cow</button>
</div>

<div class="section">
<h3>Health & Heat Tracking</h3>
<input type="text" id="healthCowID" placeholder="Cow ID">
<input type="date" id="vaccineDate">
<button onclick="addVaccine()">Add Vaccine</button>
<br><br>
<input type="text" id="heatCowID" placeholder="Cow ID">
<button onclick="addHeat()">Add Heat</button>

<table id="vaccineTable">
  <tr>
    <th>Cow ID</th>
    <th>Vaccine Date</th>
  </tr>
</table>

<table id="heatTable">
  <tr>
    <th>Cow ID</th>
    <th>Heat Detected</th>
  </tr>
</table>
</div>

<script>
const broker = 'wss://test.mosquitto.org:8081/mqtt';
const topic = 'agronex/cowdata';
const client = mqtt.connect(broker);

client.on('connect', () => {
  console.log('MQTT connected');
  client.subscribe(topic, (err) => {
    if(!err) console.log('Subscribed to ' + topic);
  });
});

client.on('message', (topic, message) => {
  const data = message.toString().split(',');
  const cowID = data[0];
  const temp = data[1];
  const activity = data[2];

  updateCowTable(cowID, temp, activity);
});

// --- Cow table functions ---
function updateCowTable(cowID, temp, activity){
  const table = document.getElementById('cowTable');
  const existingRow = document.getElementById('row-' + cowID);
  if(existingRow) existingRow.remove();

  const row = table.insertRow();
  row.id = 'row-' + cowID;
  row.insertCell(0).innerText = cowID;
  row.insertCell(1).innerText = temp;
  row.insertCell(2).innerText = activity;
  const actionCell = row.insertCell(3);
  const delBtn = document.createElement('button');
  delBtn.innerText = 'Delete';
  delBtn.onclick = () => deleteCow(cowID);
  actionCell.appendChild(delBtn);
}

function addCow(){
  const cowID = document.getElementById('addCowID').value;
  const temp = document.getElementById('addTemp').value;
  const activity = document.getElementById('addActivity').value;
  if(cowID) updateCowTable(cowID, temp || '-', activity || '-');
}

function deleteCow(cowID){
  const row = document.getElementById('row-' + cowID);
  if(row) row.remove();
  // Optional: send MQTT delete message if you want remote update
}

// --- Vaccine & Heat functions ---
function addVaccine(){
  const cowID = document.getElementById('healthCowID').value;
  const date = document.getElementById('vaccineDate').value;
  if(!cowID || !date) return;
  const table = document.getElementById('vaccineTable');
  const existingRow = document.getElementById('vaccine-' + cowID);
  if(existingRow) existingRow.remove();
  const row = table.insertRow();
  row.id = 'vaccine-' + cowID;
  row.insertCell(0).innerText = cowID;
  row.insertCell(1).innerText = date;
}

function addHeat(){
  const cowID = document.getElementById('heatCowID').value;
  if(!cowID) return;
  const table = document.getElementById('heatTable');
  const existingRow = document.getElementById('heat-' + cowID);
  if(existingRow) existingRow.remove();
  const row = table.insertRow();
  row.id = 'heat-' + cowID;
  row.insertCell(0).innerText = cowID;
  row.insertCell(1).innerText = 'Detected';
}
</script>

</body>
</html>
